<svg viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070b14"/>
      <stop offset="100%" stop-color="#0d1524"/>
    </linearGradient>
    <linearGradient id="srcGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1e35"/>
      <stop offset="100%" stop-color="#071525"/>
    </linearGradient>
    <linearGradient id="mapGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d2a1a"/>
      <stop offset="100%" stop-color="#071810"/>
    </linearGradient>
    <linearGradient id="latGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a0d"/>
      <stop offset="100%" stop-color="#0f0f06"/>
    </linearGradient>
    <linearGradient id="margGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a0f0f"/>
      <stop offset="100%" stop-color="#180808"/>
    </linearGradient>
    <linearGradient id="outGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#120d2a"/>
      <stop offset="100%" stop-color="#090618"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow4">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="aFlow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00aacc"/>
    </marker>
    <pattern id="grid4" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-width="0.12" opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="900" height="380" fill="url(#bg4)"/>
  <rect width="900" height="380" fill="url(#grid4)"/>

  <!-- Title -->
  <text x="450" y="26" text-anchor="middle" font-size="11" fill="#4a7fa5" letter-spacing="3">CANON — FROM REAL DATA TO LATENT STATE</text>
  <line x1="60" y1="34" x2="840" y2="34" stroke="#1a3a5c" stroke-width="0.5"/>

  <!-- ═══ STAGE 1: DATA SOURCES ═══ -->
  <rect x="30" y="60" width="148" height="230" rx="5" fill="url(#srcGrad)" stroke="#2a5a8a" stroke-width="1.3" filter="url(#softGlow4)"/>
  <rect x="30" y="60" width="148" height="26" rx="5" fill="#0a1e35"/>
  <rect x="30" y="78" width="148" height="8" fill="#0a1e35"/>
  <text x="104" y="78" text-anchor="middle" font-size="9.5" fill="#4a9acc" letter-spacing="1.5">DATA SOURCES</text>

  <!-- ADT -->
  <rect x="42" y="100" width="124" height="42" rx="3" fill="#07121e" stroke="#1a4060" stroke-width="0.8"/>
  <text x="104" y="116" text-anchor="middle" font-size="10" fill="#5aaccc" font-weight="bold">ADT</text>
  <text x="104" y="130" text-anchor="middle" font-size="7.5" fill="#2a5a7a">admit / discharge / transfer</text>

  <!-- Orders -->
  <rect x="42" y="150" width="124" height="42" rx="3" fill="#07121e" stroke="#1a4060" stroke-width="0.8"/>
  <text x="104" y="166" text-anchor="middle" font-size="10" fill="#5aaccc" font-weight="bold">ORDERS</text>
  <text x="104" y="180" text-anchor="middle" font-size="7.5" fill="#2a5a7a">clinical orders / tasks</text>

  <!-- Staffing -->
  <rect x="42" y="200" width="124" height="42" rx="3" fill="#07121e" stroke="#1a4060" stroke-width="0.8"/>
  <text x="104" y="216" text-anchor="middle" font-size="10" fill="#5aaccc" font-weight="bold">STAFFING</text>
  <text x="104" y="230" text-anchor="middle" font-size="7.5" fill="#2a5a7a">census / ratio / coverage</text>

  <text x="104" y="275" text-anchor="middle" font-size="8" fill="#1a4060" font-style="italic">raw operational</text>
  <text x="104" y="287" text-anchor="middle" font-size="8" fill="#1a4060" font-style="italic">data streams</text>

  <!-- ARROW 1 -->
  <line x1="178" y1="175" x2="222" y2="175" stroke="#00aacc" stroke-width="2" marker-end="url(#aFlow)"/>
  <text x="200" y="165" text-anchor="middle" font-size="7.5" fill="#2a6a8a">proxy</text>
  <text x="200" y="187" text-anchor="middle" font-size="7.5" fill="#2a6a8a">map</text>

  <!-- ═══ STAGE 2: PROXY MAPPING ═══ -->
  <rect x="222" y="88" width="152" height="174" rx="5" fill="url(#mapGrad)" stroke="#00cc66" stroke-width="2.2" filter="url(#softGlow4)"/>
  <rect x="224" y="90" width="148" height="26" rx="5" fill="#0a2018"/>
  <rect x="224" y="108" width="148" height="8" fill="#0a2018"/>
  <text x="298" y="108" text-anchor="middle" font-size="9.5" fill="#4acc88" letter-spacing="1">PROXY MAPPING</text>

  <text x="298" y="137" text-anchor="middle" font-size="7.5" fill="#3a8a5a">Transforms and interprets</text>
  <text x="298" y="149" text-anchor="middle" font-size="7.5" fill="#3a8a5a">raw signals into</text>
  <text x="298" y="162" text-anchor="middle" font-size="8.5" fill="#00cc66">structured variables</text>

  <line x1="236" y1="164" x2="360" y2="164" stroke="#1a4a2a" stroke-width="0.5"/>

  <text x="236" y="182" font-size="8" fill="#2a6a3a">census</text>
  <text x="360" y="182" text-anchor="end" font-size="8" fill="#5aaa70">→ Ω_V proxy</text>

  <text x="236" y="198" font-size="8" fill="#2a6a3a">orders/lag</text>
  <text x="360" y="198" text-anchor="end" font-size="8" fill="#5aaa70">→ H proxy</text>

  <text x="236" y="214" font-size="8" fill="#2a6a3a">handoff qual.</text>
  <text x="360" y="214" text-anchor="end" font-size="8" fill="#5aaa70">→ L_P proxy</text>

  <text x="236" y="230" font-size="8" fill="#2a6a3a">escalations</text>
  <text x="360" y="230" text-anchor="end" font-size="8" fill="#5aaa70">→ Π proxy</text>

  <text x="298" y="252" text-anchor="middle" font-size="7.5" fill="#1a5a2a" font-style="italic">structured</text>
  <text x="298" y="264" text-anchor="middle" font-size="7.5" fill="#1a5a2a" font-style="italic">approximation</text>

  <!-- ARROW 2 — thicker: critical transformation step -->
  <line x1="372" y1="175" x2="415" y2="175" stroke="#00cc66" stroke-width="3" marker-end="url(#aFlow)"/>
  <text x="393" y="163" text-anchor="middle" font-size="7.5" fill="#2a8a5a">state</text>
  <text x="393" y="189" text-anchor="middle" font-size="7.5" fill="#2a8a5a">build</text>

  <!-- ═══ STAGE 3: LATENT STATE ═══ -->
  <rect x="418" y="80" width="130" height="190" rx="5" fill="url(#latGrad)" stroke="#8a8a20" stroke-width="1.3" filter="url(#softGlow4)"/>
  <rect x="418" y="80" width="130" height="26" rx="5" fill="#181808"/>
  <rect x="418" y="98" width="130" height="8" fill="#181808"/>
  <text x="483" y="92" text-anchor="middle" font-size="7" fill="#6a6a20" letter-spacing="0.5">Constructed State Representation</text>
  <text x="483" y="102" text-anchor="middle" font-size="9.5" fill="#cccc44" letter-spacing="1">LATENT STATE</text>

  <text x="483" y="128" text-anchor="middle" font-size="11" fill="#dddd55" filter="url(#glow4)">x̃</text>

  <line x1="428" y1="140" x2="537" y2="140" stroke="#3a3a10" stroke-width="0.5"/>

  <text x="428" y="158" font-size="8.5" fill="#8a8a30">Ω_V</text>
  <text x="537" y="158" text-anchor="end" font-size="8" fill="#aaaa40">viability margin</text>
  <text x="428" y="174" font-size="8.5" fill="#8a8a30">Π</text>
  <text x="537" y="174" text-anchor="end" font-size="8" fill="#aaaa40">regulation</text>
  <text x="428" y="190" font-size="8.5" fill="#8a8a30">H</text>
  <text x="537" y="190" text-anchor="end" font-size="8" fill="#aaaa40">history load</text>
  <text x="428" y="206" font-size="8.5" fill="#8a8a30">L_P</text>
  <text x="537" y="206" text-anchor="end" font-size="8" fill="#aaaa40">proj. loss</text>
  <text x="428" y="222" font-size="8.5" fill="#8a8a30">C_x</text>
  <text x="537" y="222" text-anchor="end" font-size="8" fill="#aaaa40">coherence</text>
  <text x="428" y="238" font-size="8.5" fill="#8a8a30">A_s</text>
  <text x="537" y="238" text-anchor="end" font-size="8" fill="#aaaa40">state volume</text>

  <text x="483" y="260" text-anchor="middle" font-size="7.5" fill="#4a4a18" font-style="italic">full extended state</text>

  <!-- ARROW 3 -->
  <line x1="548" y1="175" x2="592" y2="175" stroke="#00aacc" stroke-width="2" marker-end="url(#aFlow)"/>
  <text x="570" y="165" text-anchor="middle" font-size="7.5" fill="#2a6a8a">compute</text>
  <text x="570" y="187" text-anchor="middle" font-size="7.5" fill="#2a6a8a">margin</text>

  <!-- ═══ STAGE 4: Δc* ═══ -->
  <rect x="595" y="110" width="110" height="130" rx="5" fill="url(#margGrad)" stroke="#aa3333" stroke-width="1.3" filter="url(#softGlow4)"/>
  <rect x="595" y="110" width="110" height="24" rx="5" fill="#1a0808"/>
  <rect x="595" y="126" width="110" height="8" fill="#1a0808"/>
  <text x="650" y="126" text-anchor="middle" font-size="9" fill="#cc5555" letter-spacing="1">COLLAPSE</text>
  <text x="650" y="138" text-anchor="middle" font-size="9" fill="#cc5555" letter-spacing="1">MARGIN</text>

  <text x="650" y="166" text-anchor="middle" font-size="16" fill="#ff6666" filter="url(#glow4)">Δc*</text>

  <line x1="606" y1="180" x2="694" y2="180" stroke="#3a1010" stroke-width="0.5"/>
  <text x="650" y="198" text-anchor="middle" font-size="8" fill="#884444">&gt; 0 → viable</text>
  <text x="650" y="212" text-anchor="middle" font-size="8" fill="#cc3333">≤ 0 → failure</text>

  <text x="650" y="232" text-anchor="middle" font-size="7.5" fill="#4a1a1a" font-style="italic">scalar viability</text>
  <text x="650" y="244" text-anchor="middle" font-size="7.5" fill="#4a1a1a" font-style="italic">indicator</text>

  <!-- ARROW 4 -->
  <line x1="705" y1="175" x2="748" y2="175" stroke="#00aacc" stroke-width="2" marker-end="url(#aFlow)"/>
  <text x="726" y="165" text-anchor="middle" font-size="7.5" fill="#2a6a8a">render</text>
  <text x="726" y="187" text-anchor="middle" font-size="7.5" fill="#2a6a8a">output</text>

  <!-- ═══ STAGE 5: DIAGNOSTIC OUTPUT ═══ -->
  <rect x="750" y="70" width="130" height="210" rx="5" fill="url(#outGrad)" stroke="#6644cc" stroke-width="1.3" filter="url(#softGlow4)"/>
  <rect x="750" y="70" width="130" height="24" rx="5" fill="#0f0820"/>
  <rect x="750" y="86" width="130" height="8" fill="#0f0820"/>
  <text x="815" y="86" text-anchor="middle" font-size="9" fill="#9977ee" letter-spacing="1">DIAGNOSTIC</text>
  <text x="815" y="96" text-anchor="middle" font-size="9" fill="#9977ee" letter-spacing="1">OUTPUT</text>

  <!-- Output items -->
  <rect x="760" y="110" width="110" height="26" rx="2" fill="#0c081a" stroke="#3a2870" stroke-width="0.6"/>
  <text x="815" y="128" text-anchor="middle" font-size="8.5" fill="#7766cc">Δc* trace</text>

  <rect x="760" y="142" width="110" height="26" rx="2" fill="#0c081a" stroke="#3a2870" stroke-width="0.6"/>
  <text x="815" y="160" text-anchor="middle" font-size="8.5" fill="#7766cc">waveform view</text>

  <rect x="760" y="174" width="110" height="26" rx="2" fill="#0c081a" stroke="#3a2870" stroke-width="0.6"/>
  <text x="815" y="192" text-anchor="middle" font-size="8.5" fill="#7766cc">phase portrait</text>

  <rect x="760" y="206" width="110" height="26" rx="2" fill="#0c081a" stroke="#3a2870" stroke-width="0.6"/>
  <text x="815" y="224" text-anchor="middle" font-size="8.5" fill="#7766cc">boundary trend</text>

  <text x="815" y="265" text-anchor="middle" font-size="7.5" fill="#3a2870" font-style="italic">M_view = Render(</text>
  <text x="815" y="277" text-anchor="middle" font-size="7.5" fill="#3a2870" font-style="italic">  Filter(Z))</text>

  <!-- ═══ BOTTOM KEY POINT ═══ -->
  <rect x="30" y="315" width="850" height="48" rx="3" fill="#04080f" stroke="#1a2a3a" stroke-width="0.7"/>
  <text x="450" y="332" text-anchor="middle" font-size="9" fill="#3a6a8a">KEY POINT</text>
  <text x="450" y="350" text-anchor="middle" font-size="10.5" fill="#aaccdd">CANON does not <tspan fill="#f5a020">replace</tspan> data — it <tspan fill="#00cc66">restructures</tspan> it into latent state for diagnostic evaluation.</text>
  <text x="450" y="365" text-anchor="middle" font-size="8.5" fill="#2a4a6a">Proxy mapping introduces approximation. The framework is diagnostic, not predictive.</text>
</svg>
