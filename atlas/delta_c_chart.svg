<svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070b14"/>
      <stop offset="100%" stop-color="#0d1524"/>
    </linearGradient>
    <linearGradient id="kpiLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#aa88ff"/>
      <stop offset="100%" stop-color="#8866dd"/>
    </linearGradient>
    <linearGradient id="deltaLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00cc66"/>
      <stop offset="60%" stop-color="#f5a020"/>
      <stop offset="100%" stop-color="#ff3333"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="aB3" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#2a6aaa"/>
    </marker>
    <pattern id="grid3" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-width="0.12" opacity="0.05"/>
    </pattern>
    <clipPath id="chartArea">
      <rect x="80" y="55" width="680" height="320"/>
    </clipPath>
  </defs>

  <rect width="900" height="460" fill="url(#bg3)"/>
  <rect width="900" height="460" fill="url(#grid3)"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="11" fill="#4a7fa5" letter-spacing="3">CANON — LATENT vs VISIBLE BEHAVIOR</text>
  <line x1="60" y1="36" x2="840" y2="36" stroke="#1a3a5c" stroke-width="0.5"/>

  <!-- Subtitle -->
  <text x="420" y="48" text-anchor="middle" font-size="9" fill="#2a5a7a">Δc* (latent degradation) vs KPI (visible metric) over time</text>

  <!-- ═══ CHART AREA ═══ -->
  <rect x="80" y="55" width="680" height="320" fill="#03070e" stroke="#1a2a3a" stroke-width="1"/>

  <!-- Horizontal grid lines -->
  <line x1="80" y1="135" x2="760" y2="135" stroke="#1a2a3a" stroke-width="0.6"/>
  <line x1="80" y1="215" x2="760" y2="215" stroke="#1a2a3a" stroke-width="0.6"/>
  <line x1="80" y1="295" x2="760" y2="295" stroke="#1a2a3a" stroke-width="0.6"/>

  <!-- Zero / collapse line -->
  <line x1="80" y1="295" x2="760" y2="295" stroke="#442222" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="766" y="298" font-size="8" fill="#664444">Δc*=0</text>

  <!-- Shaded failure region -->
  <rect x="80" y="295" width="680" height="80" fill="#1a0505" opacity="0.5" clip-path="url(#chartArea)"/>
  <text x="420" y="348" text-anchor="middle" font-size="9" fill="#552222" font-style="italic">collapse zone</text>

  <!-- DIVERGENCE ANNOTATION region -->
  <rect x="350" y="55" width="2" height="320" fill="#2a5a2a" opacity="0.6"/>
  <text x="356" y="74" font-size="8" fill="#2a7a2a">divergence</text>
  <text x="356" y="84" font-size="8" fill="#2a7a2a">begins here</text>

  <!-- KPI LINE — near-flat with slight wobble, stays high -->
  <!-- Points: roughly flat ~y=150, slight noise -->
  <polyline
    points="80,148 115,146 150,149 185,147 220,150 255,148 290,151 325,149 360,150 395,151 430,150 465,152 500,151 530,150 560,152 590,151 620,150 650,152 680,151 710,150 740,151 760,150"
    fill="none" stroke="#9966ff" stroke-width="2.5" clip-path="url(#chartArea)" filter="url(#glow3)"/>

  <!-- Subtle KPI noise wobble overlay -->
  <polyline
    points="80,148 100,145 120,151 140,147 165,149 190,146 215,151 240,148 265,150 290,153 315,148 340,150 365,147 390,152 415,149 440,151 465,153 490,148 515,151 540,150 565,152 590,149 615,151 640,150 665,152 690,149 715,151 740,150 760,149"
    fill="none" stroke="#7744cc" stroke-width="1" opacity="0.5" clip-path="url(#chartArea)"/>

  <!-- KPI dot at end -->
  <circle cx="760" cy="150" r="4" fill="#9966ff" filter="url(#glow3)"/>

  <!-- Δc* LINE — early slope steepened further for clear divergence from first frame -->
  <polyline
    points="80,195 115,200 150,206 185,212 220,218 255,225 290,232 325,240 360,250 395,262 430,275 465,290 500,305 530,318 560,330 590,342 620,351 650,357 680,361 710,363 740,364 760,365"
    fill="none" stroke="url(#deltaLine)" stroke-width="2.8" clip-path="url(#chartArea)" filter="url(#glow3)"/>

  <!-- C3 — Subtle hidden instability shading: divergence → failure region -->
  <polygon
    points="350,55 760,55 760,375 350,375"
    fill="#1a1a08" opacity="0.18" clip-path="url(#chartArea)"/>

  <!-- Δc* failure area fill (below zero) -->
  <polygon
    points="448,295 465,290 500,305 530,318 560,330 590,342 620,351 650,357 680,361 710,363 740,364 760,365 760,375 448,375"
    fill="#440000" opacity="0.35" clip-path="url(#chartArea)"/>

  <!-- Δc* start dot — raised to match steepened trace -->
  <circle cx="80" cy="195" r="4" fill="#00cc66" filter="url(#glow3)"/>
  <!-- Δc* end dot — in failure zone -->
  <circle cx="760" cy="365" r="5" fill="#ff3333" filter="url(#redGlow)"/>

  <!-- C2 — Divergence vertical line, aligned to where Δc* visibly separates -->
  <line x1="350" y1="55" x2="350" y2="375" stroke="#336633" stroke-width="1.3" stroke-dasharray="4,4"/>

  <!-- PHASE LABELS on chart -->
  <!-- Phase 1: stable -->
  <rect x="88" y="62" width="108" height="34" rx="2" fill="#030a05" stroke="#1a4a2a" stroke-width="0.6"/>
  <text x="142" y="77" text-anchor="middle" font-size="8.5" fill="#00aa44">STABILITY PHASE</text>
  <text x="142" y="90" text-anchor="middle" font-size="8" fill="#1a5a2a">Δc* ≈ 0, KPI normal</text>

  <!-- Phase 2: degradation -->
  <rect x="360" y="62" width="115" height="34" rx="2" fill="#0a0400" stroke="#4a2a00" stroke-width="0.6"/>
  <text x="417" y="77" text-anchor="middle" font-size="8.5" fill="#f5a020">DEGRADATION PHASE</text>
  <text x="417" y="90" text-anchor="middle" font-size="8" fill="#7a5010">latent drift accelerates</text>

  <!-- Phase 3: failure -->
  <rect x="590" y="62" width="100" height="34" rx="2" fill="#0f0000" stroke="#5a1010" stroke-width="0.6"/>
  <text x="640" y="77" text-anchor="middle" font-size="8.5" fill="#ff4444">FAILURE ONSET</text>
  <text x="640" y="90" text-anchor="middle" font-size="8" fill="#7a1a1a">Δc* &lt; 0, system invalid</text>

  <!-- AXES -->
  <line x1="80" y1="375" x2="760" y2="375" stroke="#1a3a5c" stroke-width="1" marker-end="url(#aB3)"/>
  <text x="420" y="395" text-anchor="middle" font-size="9" fill="#2a5a7a">time →</text>
  <!-- tick marks -->
  <line x1="200" y1="373" x2="200" y2="377" stroke="#1a3a5c" stroke-width="1"/>
  <line x1="350" y1="373" x2="350" y2="377" stroke="#1a3a5c" stroke-width="1"/>
  <line x1="500" y1="373" x2="500" y2="377" stroke="#1a3a5c" stroke-width="1"/>
  <line x1="650" y1="373" x2="650" y2="377" stroke="#1a3a5c" stroke-width="1"/>
  <text x="200" y="388" text-anchor="middle" font-size="8" fill="#1a3a5c">t1</text>
  <text x="350" y="388" text-anchor="middle" font-size="8" fill="#1a3a5c">t2</text>
  <text x="500" y="388" text-anchor="middle" font-size="8" fill="#1a3a5c">t3</text>
  <text x="650" y="388" text-anchor="middle" font-size="8" fill="#1a3a5c">t4</text>

  <line x1="80" y1="375" x2="80" y2="55" stroke="#1a3a5c" stroke-width="1" marker-end="url(#aB3)"/>

  <!-- Y axis labels -->
  <text x="74" y="152" text-anchor="end" font-size="8" fill="#9966ff">KPI</text>
  <text x="74" y="289" text-anchor="end" font-size="8" fill="#00cc66">Δc*≈0</text>
  <text x="74" y="370" text-anchor="end" font-size="8" fill="#ff4444">Δc*&lt;0</text>

  <!-- ═══ RIGHT PANEL: Legend ═══ -->
  <rect x="784" y="55" width="100" height="320" rx="3" fill="#04080f" stroke="#1a2a3a" stroke-width="1"/>
  <text x="834" y="76" text-anchor="middle" font-size="9" fill="#4a7fa5" letter-spacing="1">LEGEND</text>
  <line x1="792" y1="82" x2="876" y2="82" stroke="#1a3a5c" stroke-width="0.5"/>

  <line x1="796" y1="110" x2="826" y2="110" stroke="#9966ff" stroke-width="2.5"/>
  <text x="834" y="114" font-size="8.5" fill="#9966ff">KPI</text>
  <text x="796" y="128" font-size="7.5" fill="#554477">visible metric</text>
  <text x="796" y="139" font-size="7.5" fill="#554477">appears stable</text>

  <line x1="796" y1="168" x2="810" y2="168" stroke="#00cc66" stroke-width="2.5"/>
  <line x1="810" y1="168" x2="820" y2="168" stroke="#f5a020" stroke-width="2.5"/>
  <line x1="820" y1="168" x2="826" y2="168" stroke="#ff3333" stroke-width="2.5"/>
  <text x="834" y="172" font-size="8.5" fill="#aaccdd">Δc*</text>
  <text x="796" y="186" font-size="7.5" fill="#3a7a4a">latent margin</text>
  <text x="796" y="197" font-size="7.5" fill="#3a7a4a">drifts negative</text>

  <line x1="792" y1="212" x2="876" y2="212" stroke="#1a3a5c" stroke-width="0.4"/>

  <text x="834" y="232" text-anchor="middle" font-size="7.5" fill="#4a7fa5">KPI REACTS</text>
  <text x="834" y="244" text-anchor="middle" font-size="7.5" fill="#4a7fa5">LATE</text>
  <text x="796" y="263" font-size="7" fill="#3a5a7a" font-style="italic">Dashboards see</text>
  <text x="796" y="274" font-size="7" fill="#3a5a7a" font-style="italic">failure after it</text>
  <text x="796" y="285" font-size="7" fill="#3a5a7a" font-style="italic">is underway.</text>

  <!-- BOTTOM ANNOTATION -->
  <rect x="80" y="408" width="800" height="40" rx="3" fill="#03070e" stroke="#1a2a3a" stroke-width="0.6"/>
  <text x="450" y="424" text-anchor="middle" font-size="9" fill="#3a6a8a">OPERATIONAL IMPLICATION</text>
  <text x="450" y="440" text-anchor="middle" font-size="10" fill="#aaccdd">Dashboards detect failure <tspan fill="#ff4444">after</tspan> it is already underway. Δc* leads KPI by design.</text>
</svg>
