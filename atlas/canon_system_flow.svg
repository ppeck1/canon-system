<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070b14"/>
      <stop offset="100%" stop-color="#0d1524"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f2a45"/>
      <stop offset="100%" stop-color="#071828"/>
    </linearGradient>
    <linearGradient id="projGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0f2e"/>
      <stop offset="100%" stop-color="#0d0a1e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="boundaryGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowBlue" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#00c4f0"/>
    </marker>
    <marker id="arrowGreenSm" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 5 2, 0 4" fill="#00aa44"/>
    </marker>
    <marker id="arrowGreenOut" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#00ee77"/>
    </marker>
    <marker id="arrowPurple" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#9966ff"/>
    </marker>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-width="0.12" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg)"/>
  <rect width="900" height="520" fill="url(#grid)"/>

  <!-- Title -->
  <text x="450" y="26" text-anchor="middle" font-size="11" fill="#4a7fa5" letter-spacing="3">CANON — SYSTEM EVOLUTION MODEL</text>
  <line x1="28" y1="34" x2="872" y2="34" stroke="#1a3a5c" stroke-width="0.5"/>

  <!-- ══════════════════════════════════════ -->
  <!-- TOP LAYER: LATENT DOMAIN              -->
  <!-- ══════════════════════════════════════ -->

  <text x="36" y="52" font-size="7.5" fill="#1a3a5c" letter-spacing="2.5">LATENT DOMAIN</text>

  <!-- ── LATENT STATE BOX ── -->
  <!-- Box: x=28 y=57, w=178, h=215 → bottom at y=272 -->
  <rect x="28" y="57" width="178" height="215" rx="4"
        fill="url(#nodeGrad)" stroke="#00aaff" stroke-width="1.3"
        filter="url(#subtleGlow)"/>

  <!-- Header band -->
  <rect x="28" y="57" width="178" height="30" rx="4" fill="#0a2040"/>
  <rect x="28" y="79" width="178" height="8" fill="#0a2040"/>
  <text x="117" y="73" text-anchor="middle" font-size="10" fill="#00d4ff"
        letter-spacing="1.5" font-weight="bold">LATENT STATE</text>
  <text x="117" y="86" text-anchor="middle" font-size="11" fill="#00c4f0">x_t</text>

  <!-- Variable rows: fixed 26px spacing, starting y=112 -->
  <text x="42" y="114" font-size="8.5" fill="#aaccdd">Viability Margin</text>
  <text x="200" y="114" text-anchor="end" font-size="8.5" fill="#4a8ab5">(Ω_V)</text>

  <text x="42" y="140" font-size="8.5" fill="#aaccdd">Regulatory Pressure</text>
  <text x="200" y="140" text-anchor="end" font-size="8.5" fill="#4a8ab5">(Π)</text>

  <text x="42" y="166" font-size="8.5" fill="#aaccdd">Accumulated Load</text>
  <text x="200" y="166" text-anchor="end" font-size="8.5" fill="#4a8ab5">(H)</text>

  <text x="42" y="192" font-size="8.5" fill="#aaccdd">Coherence</text>
  <text x="200" y="192" text-anchor="end" font-size="8.5" fill="#4a8ab5">(C_x)</text>

  <text x="42" y="218" font-size="8.5" fill="#aaccdd">Projection Loss</text>
  <text x="200" y="218" text-anchor="end" font-size="8.5" fill="#4a8ab5">(L_P)</text>

  <text x="42" y="244" font-size="8.5" fill="#aaccdd">Accessible Volume</text>
  <text x="200" y="244" text-anchor="end" font-size="8.5" fill="#4a8ab5">(A_s)</text>

  <!-- Bottom: "unobserved" — centered, slightly dimmed -->
  <text x="117" y="262" text-anchor="middle" font-size="7.5"
        fill="#2a4a6a" opacity="0.65" font-style="italic">unobserved</text>

  <!-- Arrow: Latent State → F(x_t) -->
  <line x1="206" y1="164" x2="252" y2="164"
        stroke="#00c4f0" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- ── F(x_t) BOX ── -->
  <!-- x=255, y=84, w=152, h=163 -->
  <rect x="255" y="84" width="152" height="163" rx="4"
        fill="url(#nodeGrad)" stroke="#0088cc" stroke-width="1.2"/>
  <rect x="255" y="84" width="152" height="28" rx="4" fill="#071828"/>
  <rect x="255" y="104" width="152" height="8" fill="#071828"/>

  <text x="331" y="101" text-anchor="middle" font-size="9.5" fill="#00b8e0"
        letter-spacing="1">LATENT EVOLUTION</text>
  <text x="331" y="126" text-anchor="middle" font-size="17"
        fill="#00c4f0" filter="url(#glow)">F(x_t)</text>

  <text x="331" y="153" text-anchor="middle" font-size="8"
        fill="#5a8aaa">unconstrained dynamics</text>
  <line x1="270" y1="160" x2="390" y2="160" stroke="#1a3a5c" stroke-width="0.4"/>
  <text x="331" y="176" text-anchor="middle" font-size="7.5"
        fill="#3a6a8a" font-style="italic">load · drift · accumulation</text>
  <text x="331" y="191" text-anchor="middle" font-size="7.5"
        fill="#3a6a8a" font-style="italic">internal system forces</text>
  <text x="331" y="232" text-anchor="middle" font-size="7.5"
        fill="#2a5a7a">pre-projection state</text>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- FUNNEL — 6 arrows in (above boundary), 2 arrows out (below)       -->
  <!-- Funnel x-center ≈ 440. Boundary at y=296.                         -->
  <!-- ══════════════════════════════════════════════════════════════════ -->

  <!-- Horizontal pipe from F(x_t) right edge to funnel start -->
  <line x1="407" y1="164" x2="414" y2="247"
        stroke="#00aa44" stroke-width="0.6" stroke-dasharray="2,3" opacity="0.35"/>

  <!-- 6 input arrows: spread x=400-460, y_start=247 → converge y_end=294 -->
  <line x1="400" y1="247" x2="413" y2="294"
        stroke="#00aa44" stroke-width="1.1" opacity="0.90" marker-end="url(#arrowGreenSm)"/>
  <line x1="412" y1="247" x2="420" y2="294"
        stroke="#00aa44" stroke-width="1.1" opacity="0.88" marker-end="url(#arrowGreenSm)"/>
  <line x1="424" y1="247" x2="427" y2="294"
        stroke="#00aa44" stroke-width="1.2" opacity="0.92" marker-end="url(#arrowGreenSm)"/>
  <line x1="436" y1="247" x2="434" y2="294"
        stroke="#00aa44" stroke-width="1.1" opacity="0.88" marker-end="url(#arrowGreenSm)"/>
  <line x1="448" y1="247" x2="441" y2="294"
        stroke="#00aa44" stroke-width="1.0" opacity="0.72" marker-end="url(#arrowGreenSm)"/>
  <line x1="460" y1="247" x2="448" y2="294"
        stroke="#00aa44" stroke-width="0.9" opacity="0.55" marker-end="url(#arrowGreenSm)"/>

  <!-- 6 input arrows: spread x=400-460, stop well ABOVE boundary (gap = 16px) -->
  <line x1="400" y1="247" x2="412" y2="264"
        stroke="#00aa44" stroke-width="1.1" opacity="0.90" marker-end="url(#arrowGreenSm)"/>
  <line x1="412" y1="247" x2="419" y2="264"
        stroke="#00aa44" stroke-width="1.1" opacity="0.88" marker-end="url(#arrowGreenSm)"/>
  <line x1="424" y1="247" x2="426" y2="264"
        stroke="#00aa44" stroke-width="1.2" opacity="0.92" marker-end="url(#arrowGreenSm)"/>
  <line x1="436" y1="247" x2="433" y2="264"
        stroke="#00aa44" stroke-width="1.1" opacity="0.88" marker-end="url(#arrowGreenSm)"/>
  <line x1="448" y1="247" x2="440" y2="264"
        stroke="#00aa44" stroke-width="1.0" opacity="0.72" marker-end="url(#arrowGreenSm)"/>
  <line x1="460" y1="247" x2="447" y2="264"
        stroke="#00aa44" stroke-width="0.9" opacity="0.55" marker-end="url(#arrowGreenSm)"/>

  <!-- 2 output arrows: emerge well BELOW boundary (gap = 12px) -->
  <line x1="420" y1="292" x2="420" y2="325"
        stroke="#00ee77" stroke-width="1.7" opacity="0.92" marker-end="url(#arrowGreenOut)"/>
  <line x1="436" y1="292" x2="436" y2="325"
        stroke="#00ee77" stroke-width="1.4" opacity="0.72" marker-end="url(#arrowGreenOut)"/>

  <!-- Projection Loss annotation -->
  <line x1="464" y1="267" x2="510" y2="267"
        stroke="#1a2a3a" stroke-width="0.6" stroke-dasharray="2,3"/>
  <text x="514" y="261" font-size="8" fill="#cc4444">Projection Loss (L_P)</text>
  <text x="514" y="274" font-size="7.5" fill="#6a2222">6 channels in  →  2 out</text>
  <text x="514" y="286" font-size="7.5" fill="#6a2222">information lost at ∂K</text>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- Π_K — VIABILITY BOUNDARY                                          -->
  <!-- Raised to y=279. Full-width. Reads as spatial constraint.         -->
  <!-- ══════════════════════════════════════════════════════════════════ -->

  <!-- Constraint zone band — thin filled region, not a process node -->
  <rect x="8" y="274" width="884" height="10" fill="#00cc66" opacity="0.04"/>

  <!-- Wide glow layer — extends beyond content, signals spatial reach -->
  <line x1="8" y1="279" x2="892" y2="279"
        stroke="#00cc66" stroke-width="8" opacity="0.05"
        filter="url(#boundaryGlow)"/>

  <!-- Main boundary line — full width, solid weight -->
  <line x1="8" y1="279" x2="892" y2="279"
        stroke="#00cc66" stroke-width="2" stroke-dasharray="8,5" opacity="0.90"/>

  <!-- End ticks — wider than content, reinforcing edge-to-edge span -->
  <line x1="8" y1="271" x2="8" y2="287" stroke="#00cc66" stroke-width="2" opacity="0.55"/>
  <line x1="892" y1="271" x2="892" y2="287" stroke="#00cc66" stroke-width="2" opacity="0.55"/>

  <!-- Label pill — floated above the line with clearance, not embedded between arrows -->
  <rect x="290" y="256" width="248" height="17" rx="2" fill="#061408"/>
  <text x="414" y="268" text-anchor="middle" font-size="9.5"
        fill="#00ee77" letter-spacing="1.5" filter="url(#glow)">Viability Boundary  (Π_K)</text>

  <!-- Zone micro-labels at far edges -->
  <text x="16" y="271" font-size="6.5" fill="#1a5a2a" letter-spacing="1">VIABLE  K</text>
  <text x="884" y="271" text-anchor="end" font-size="6.5"
        fill="#2a3a1a" letter-spacing="1">∂K  ENFORCED</text>

  <!-- ══════════════════════════════════════ -->
  <!-- BOTTOM LAYER: OBSERVED DOMAIN         -->
  <!-- ══════════════════════════════════════ -->

  <text x="36" y="320" font-size="7.5" fill="#3a2a5a" letter-spacing="2.5">OBSERVED DOMAIN</text>

  <!-- ── PROJECTED STATE BOX ── -->
  <!-- x=28, y=325, w=350, h=118 -->
  <rect x="28" y="325" width="350" height="118" rx="4"
        fill="url(#projGrad)" stroke="#7755cc" stroke-width="1.2"/>
  <rect x="28" y="325" width="350" height="28" rx="4" fill="#12082a"/>
  <rect x="28" y="345" width="350" height="8" fill="#12082a"/>

  <text x="203" y="342" text-anchor="middle" font-size="10"
        fill="#aa88ff" letter-spacing="1.5">PROJECTED STATE</text>
  <text x="203" y="357" text-anchor="middle" font-size="10.5"
        fill="#bb99ff">Y = P_K(x̃)</text>

  <text x="44" y="382" font-size="8.5" fill="#aaccdd">occupancy</text>
  <text x="372" y="382" text-anchor="end" font-size="8" fill="#4a3a7a">↙ Ω_V compressed</text>

  <text x="44" y="402" font-size="8.5" fill="#aaccdd">throughput / ratio</text>
  <text x="372" y="402" text-anchor="end" font-size="8" fill="#4a3a7a">↙ T, Γ compressed</text>

  <text x="44" y="422" font-size="8.5" fill="#aaccdd">KPI indicators</text>
  <text x="372" y="422" text-anchor="end" font-size="8" fill="#4a3a7a">↙ H, L_P, A_s lost</text>

  <!-- Arrow: Projected State → Observed Metrics -->
  <line x1="378" y1="384" x2="423" y2="384"
        stroke="#9966ff" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- ── OBSERVED METRICS BOX ── -->
  <!-- x=426, y=325, w=416, h=118 -->
  <rect x="426" y="325" width="416" height="118" rx="4"
        fill="#06040f" stroke="#6644aa" stroke-width="1.1"/>
  <rect x="426" y="325" width="416" height="28" rx="4" fill="#0d0820"/>
  <rect x="426" y="345" width="416" height="8" fill="#0d0820"/>

  <text x="634" y="342" text-anchor="middle" font-size="10"
        fill="#8866cc" letter-spacing="1.5">OBSERVED METRICS  (M_view)</text>
  <text x="634" y="357" text-anchor="middle" font-size="8.5"
        fill="#4a3466">what dashboards see</text>

  <text x="442" y="382" font-size="8.5" fill="#7755aa">census / occupancy %</text>
  <text x="648" y="382" font-size="8.5" fill="#7755aa">throughput rates</text>

  <text x="442" y="402" font-size="8.5" fill="#7755aa">staff-to-patient ratio</text>
  <text x="648" y="402" font-size="8.5" fill="#7755aa">KPI dashboards</text>

  <text x="442" y="422" font-size="8" fill="#442255">H not visible</text>
  <text x="564" y="422" font-size="8" fill="#442255">· L_P not visible</text>
  <text x="690" y="422" font-size="8" fill="#442255">· A_s not visible</text>

  <!-- ══════════════════════════════════════ -->
  <!-- KEY IMPLICATION BAR                   -->
  <!-- ══════════════════════════════════════ -->

  <rect x="28" y="460" width="814" height="46" rx="3"
        fill="#05080e" stroke="#1a3050" stroke-width="0.7"/>
  <text x="40" y="477" font-size="8.5" fill="#3a6a8a" letter-spacing="1">KEY IMPLICATION</text>
  <text x="40" y="495" font-size="10.5" fill="#aaccdd">The system you
    <tspan fill="#00d4ff"> observe</tspan> is not the system that
    <tspan fill="#00ee77"> exists</tspan>. Latent variables H, L_P, A_s are absent from the projected state.
  </text>
</svg>
